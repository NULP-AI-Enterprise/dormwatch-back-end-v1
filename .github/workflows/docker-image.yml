name: Build server container

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build the Docker image
      run: docker build . --tag ${{ secrets.DOCKER_USERNAME }}/dormwatch-server:${{ github.sha }}

    - name: Log in to Docker Hub
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image
      if: github.event_name == 'push'
      run: docker push ${{ secrets.DOCKER_USERNAME }}/dormwatch-server:${{ github.sha }}

    - name: Prepare Dockerrun.aws.json
      if: github.event_name == 'push'
      run: |
        sed "s|__TAG__|${{ github.sha }}|" Dockerrun.aws.json > Dockerrun.tmp.json 
        mv Dockerrun.tmp.json Dockerrun.aws.json
        zip Dockerrun.zip Dockerrun.aws.json

    - name: AWS login
      if: github.event_name == 'push'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Upload to S3
      if: github.event_name == 'push'
      run: aws s3 cp Dockerrun.zip s3://${{ secrets.AWS_BUCKET }}/Dockerrun-${{ github.sha }}.zip

    - name: Deployment
      if: github.event_name == 'push'
      run: | 
          aws elasticbeanstalk create-application-version \
          --application-name dormwatch \
          --version-label ${{ github.sha }} \
          --source-bundle S3Bucket=${{ secrets.AWS_BUCKET }},S3Key=Dockerrun-${{ github.sha }}.zip
          aws elasticbeanstalk update-environment \
          --environment-name Dormwatch-env-server \
          --version-label ${{ github.sha }}