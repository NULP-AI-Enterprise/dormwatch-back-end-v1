apiVersion: apps/v1
kind: Deployment
metadata:
  name: dormwatch-backend-v1
  namespace: dormwatch-backend-v1
  labels:
    app: dormwatch-backend-v1
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dormwatch-backend-v1
  template:
    metadata:
      labels:
        app: dormwatch-backend-v1
    spec:
      containers:
        - name: dormwatch-backend-v1
          # CI automatically updates this tag after each push
          image: ghcr.io/nulp-ai-enterprise/dormwatch-back-end-v1:sha-422a62d
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dormwatch-backend-v1-secret
                  key: SECRET_KEY
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: dormwatch-backend-v1-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: dormwatch-backend-v1-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dormwatch-backend-v1-secret
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: dormwatch-backend-v1-secret
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: dormwatch-backend-v1-secret
                  key: DB_PORT
            - name: ALLOWED_EMAIL_DOMAINS
              valueFrom:
                secretKeyRef:
                  name: dormwatch-backend-v1-secret
                  key: ALLOWED_EMAIL_DOMAINS
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: dormwatch-backend-v1-secret
                  key: CORS_ALLOWED_ORIGINS
            - name: ALLOWED_HOSTS
              value: "dormwatch-v1.thesis-i.com,127.0.0.1"
            - name: DEBUG
              value: "False"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /api/health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: dormwatch-v1.thesis-i.com
            failureThreshold: 12
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: dormwatch-v1.thesis-i.com
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: dormwatch-v1.thesis-i.com
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      imagePullSecrets:
        - name: ghcr-secret
